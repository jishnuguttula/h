<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            min-height: 100vh;
            background-image: url(https://images.pexels.com/photos/3769714/pexels-photo-3769714.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2);
            display: flex;
            align-items: center;
            background-size: cover;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background-position: center;
        }

        h1 {
            color: rgb(202, 23, 23);
            margin-bottom: 20px;
        }

        label {
            color: blueviolet;
            font-size: 18px;
            font-weight: bold;
            
        }

        input {
            color: rgb(11, 210, 54);
            align-items: center;
            padding: 10px;
            margin: 10px;
            background-color: black;
            border: 1px solid chartreuse;
            border-radius: 5px;
            text-align: center;
        }

        button {
            color: chartreuse;
            background-color: black;
            border: 1px solid chartreuse;
            padding: 10px 15px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
        }

        button:hover {
            background-color: chartreuse;
            color: black;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            color: orangered;
        }
    </style>
    </head>
    <body>
        <h1>Enter the number for calculations</h1>

        <div class="container">
         
        <label for="num1">Enter number 1:</label>
        <input type="number" id="num1">

        <br>

        <label for="num2">Enter number 2:</label>
        <input type="number" id="num2">

        <br><br>
        
        <button id="multiplication">multiply</button>
        <button id="addition">addition</button>
        <button id="divide">divide</button>

        <p id="result"></p>

        </div>
        <script>

          function getValues() {
            return {
                a: parseFloat(document.getElementById("num1").value),
                b: parseFloat(document.getElementById("num2").value)
            };
        }
            
        document.getElementById("addition").addEventListener("click", function() {
            let { a, b } = getValues();
            document.getElementById("result").innerText = "Result: " + (a + b);
        });

        document.getElementById("multiplication").addEventListener("click", function() {
            let { a, b } = getValues();
            document.getElementById("result").innerText = "Result: " + (a * b);
        });

        document.getElementById("divide").addEventListener("click", function() {
            let { a, b } = getValues();
            if (b !== 0) {
                document.getElementById("result").innerText = "Result: " + (a / b);
            } else {
                document.getElementById("result").innerText = "Error: Division by zero is not allowed.";
            }
        });
        </script>
    </body>
